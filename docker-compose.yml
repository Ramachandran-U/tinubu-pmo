version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: tinubu-pmo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tinubu
      POSTGRES_PASSWORD: tinubu_secret
      POSTGRES_DB: tinubu_pmo
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
